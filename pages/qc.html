<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a1a1a" />
<title>QC · Inspection Portal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔍%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="../assets/css/main.css" />
<link rel="stylesheet" href="../assets/css/bteam.css" />
<link rel="stylesheet" href="../assets/css/review.css" />
</head>
<body class="theme-light">
<div class="lang-switcher">
<button class="lang-btn" data-lang="en">EN</button>
<button class="lang-btn active" data-lang="zh">中文</button>
</div>

<nav class="topbar">
<div class="topbar-left">
<a href="../index.html" class="topbar-back" aria-label="Back">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M19 12H5M12 19l-7-7 7-7"/>
</svg>
</a>
<div>
<div class="topbar-title" data-i18n="qc.title">QC 质检审核</div>
<div class="topbar-subtitle" data-i18n="qc.subtitle">质量控制工作台</div>
</div>
</div>
<div class="topbar-right">
<span class="role-pill" style="background: #fdf3dc; color: #c08400;">QC</span>
</div>
</nav>

<!-- Dashboard view -->
<main class="page" id="dashboardView">
<div class="dashboard-stats">
<div class="stat-card">
<div class="stat-label" data-i18n="qc.pending_review">待审核</div>
<div class="stat-value" id="pendingCount">0</div>
</div>
<div class="stat-card">
<div class="stat-label" data-i18n="qc.reviewed">已审核</div>
<div class="stat-value" id="reviewedCount">0</div>
</div>
</div>

<div class="filter-bar">
<button class="filter-btn active" data-filter="pending" data-i18n="qc.pending_review">待审核</button>
<button class="filter-btn" data-filter="reviewed" data-i18n="qc.reviewed">已审核</button>
<button class="filter-btn" data-filter="all" data-i18n="common.all">全部</button>
</div>

<div id="sessionList" class="session-list"></div>
</main>

<!-- Review view -->
<main class="page hidden" id="reviewView">
<div class="capture-header card">
<button class="btn-icon back-btn" onclick="QC.showDashboard()">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M19 12H5M12 19l-7-7 7-7"/>
</svg>
</button>
<div class="capture-title-block">
<h3 id="reviewTitle">Loading...</h3>
<div class="capture-meta" id="reviewMeta"></div>
</div>
</div>

<div class="card review-info-card">
<div class="review-info-grid" id="reviewInfo"></div>
</div>

<div class="card mb-4">
<h3 data-i18n="report.defects">缺陷</h3>
<div id="reviewDefects" class="mt-3"></div>
</div>

<div class="card mb-4">
<h3 data-i18n="photo.title">照片采集</h3>
<div class="box-tabs mt-3" id="reviewBoxTabs"></div>
<div id="reviewBoxContent"></div>
</div>

<div class="card mb-4">
<h3 data-i18n="qc.add_comment">添加备注</h3>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>QC · Inspection Portal</title>

<link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body class="theme-light">
<div class="lang-switcher">
<button class="lang-btn" data-lang="en">EN</button>
<button class="lang-btn active" data-lang="zh">中文</button>
</div>

<nav class="topbar">
<div class="topbar-left">
<a href="../index.html" class="topbar-back" aria-label="Back">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M19 12H5M12 19l-7-7 7-7"/>
</svg>
</a>
<div>
<div class="topbar-title" data-i18n="qc.title">QC 质检审核</div>
<div class="topbar-subtitle" data-i18n="qc.subtitle">质量控制工作台</div>
</div>
</div>
<div class="topbar-right">
<span class="role-pill" style="background: #fdf3dc; color: #c08400;">QC</span>
</div>
</nav>

<main class="page" id="dashboardView">
<div class="dashboard-stats">
<div class="stat-card">
<div class="stat-label" data-i18n="qc.pending_review">待审核</div>
<div class="stat-value" id="pendingCount">0</div>
</div>
<div class="stat-card">
<div class="stat-label" data-i18n="qc.reviewed">已审核</div>
<div class="stat-value" id="reviewedCount">0</div>
</div>
</div>
<div class="filter-bar">
<button class="filter-btn active" data-filter="pending" data-i18n="qc.pending_review">待审核</button>
<button class="filter-btn" data-filter="reviewed" data-i18n="qc.reviewed">已审核</button>
<button class="filter-btn" data-filter="all" data-i18n="common.all">全部</button>
</div>
<div id="sessionList" class="session-list"></div>
</main>

<main class="page hidden" id="reviewView">
<div class="capture-header card">
<button class="btn-icon back-btn" onclick="QC.showDashboard()">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M19 12H5M12 19l-7-7 7-7"/>
</svg>
</button>
<div class="capture-title-block">
<h3 id="reviewTitle">Loading...</h3>
<div class="capture-meta" id="reviewMeta"></div>
</div>
</div>
<div class="card review-info-card">
<div class="review-info-grid" id="reviewInfo"></div>
</div>
<div class="card mb-4">
<h3 data-i18n="report.defects">缺陷</h3>
<div id="reviewDefects" class="mt-3"></div>
</div>
<div class="card mb-4">
<h3 data-i18n="photo.title">照片采集</h3>
<div class="box-tabs mt-3" id="reviewBoxTabs"></div>
<div id="reviewBoxContent"></div>
</div>
<div class="card mb-4">
<h3 data-i18n="qc.add_comment">添加备注</h3>
<textarea class="form-textarea mt-3" id="qcComment" data-i18n-placeholder="qc.add_comment" rows="3"></textarea>
</div>
<div class="decision-bar">
<button class="btn btn-danger btn-lg" onclick="QC.reject()">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="12" cy="12" r="10"/>
<path d="M15 9l-6 6M9 9l6 6"/>
</svg>
<span data-i18n="qc.reject">拒绝</span>
</button>
<button class="btn btn-success btn-lg" onclick="QC.approve()">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
<path d="M22 4L12 14.01l-3-3"/>
</svg>
<span data-i18n="qc.approve">批准</span>
</button>
</div>
<div style="text-align: center; margin-top: var(--space-4);">
<button class="btn" onclick="QC.viewReport()">
<span data-i18n="report.title">查看报告</span>
</button>
</div>
</main>

<div class="photo-viewer hidden" id="photoViewer" onclick="QC.closePhotoViewer()">
<button class="photo-viewer-close" aria-label="Close">x</button>
<img id="photoViewerImg" src="" alt="" />
<div class="photo-viewer-caption" id="photoViewerCaption"></div>
</div>

<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/storage/storage-adapter.js"></script>
<script src="../assets/js/inspection-core.js"></script>
<script src="../assets/js/qc.js"></script>
</body>
</html>
